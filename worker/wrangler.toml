# Reachwright Qualify conversation Worker — NOT DEPLOYED.
# Required before deployment:
#   - Cloudflare account with MFA and separate dev/prod environments
#   - Turnstile widget restricted to the exact website host
#   - RATE and SESSIONS KV namespaces for each environment
#   - Dedicated prepaid OpenRouter key; automatic top-up disabled
#   - Provider privacy/data-retention review and a revised public privacy notice
#   - Contract tests, abuse tests, fallback tests, and a production smoke test

name = "reachwright-qualify"
main = "src/index.js"
compatibility_date = "2026-07-01"

[vars]
ALLOWED_ORIGIN = "https://reemergenceholdings.com"
MODEL = "SET_AFTER_MODEL_BAKEOFF"
MAX_TURNS = "12"
MAX_INPUT_CHARS = "500"
PROVIDER_TIMEOUT_MS = "8000"
DAILY_GLOBAL_CAP = "400"
DAILY_IP_CAP = "30"
DAILY_PREFIX_CAP = "80"

# [[kv_namespaces]]
# binding = "RATE"
# id = "REPLACE_WITH_PRODUCTION_RATE_NAMESPACE"

# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "REPLACE_WITH_PRODUCTION_SESSION_NAMESPACE"

# Optional: bind the shared Reachwright D1 database to serve operator-authored
# qualification flows and record session outcomes. Without this binding the
# worker uses its built-in interview and records nothing.
# [[d1_databases]]
# binding = "DB"
# database_name = "reachwright"
# database_id = "REPLACE_WITH_SHARED_DATABASE_ID"

# [env.dev]
# name = "reachwright-qualify-dev"
# Use a complete [env.dev.vars] table and separate dev namespaces/secrets.
